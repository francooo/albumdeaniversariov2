<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Photo album icon -->
  <rect x="22" y="28" width="56" height="44" rx="4" fill="#FFF" opacity="0.95"/>
  
  <!-- Album pages -->
  <rect x="26" y="32" width="48" height="36" rx="2" fill="#F5F5F5"/>
  
  <!-- Heart in center representing memories/love -->
  <path d="M50 38 C45 33, 38 36, 38 42 C38 50, 50 58, 50 58 C50 58, 62 50, 62 42 C62 36, 55 33, 50 38Z" 
        fill="url(#bgGradient)"/>
  
  <!-- Small photo corners decoration -->
  <circle cx="32" cy="38" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="68" cy="38" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="32" cy="62" r="3" fill="#D4AF37" opacity="0.6"/>
  <circle cx="68" cy="62" r="3" fill="#D4AF37" opacity="0.6"/>
</svg>